<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Outfitfinder</title>

<style>
:root {
--bg:#020617;
--panel:#0f172a;
--line:#1e293b;
--text:#f8fafc;
--muted:#94a3b8;
--accent:#22c55e;
--danger:#ef4444;
}

body {
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
padding:12px;
}

.tabbar{
display:flex;
gap:6px;
margin-bottom:12px;
}

.tabbar button{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:#111827;
color:white;
}

.tabbar button.active{
background:var(--accent);
color:black;
font-weight:bold;
}

.panel{
display:none;
background:var(--panel);
border:1px solid var(--line);
border-radius:16px;
padding:14px;
}

.panel.active{display:block;}

input,select{
width:100%;
margin-top:8px;
margin-bottom:10px;
padding:10px;
border-radius:10px;
border:1px solid var(--line);
background:#020617;
color:white;
}

button.main{
background:var(--accent);
color:black;
font-weight:bold;
padding:14px;
border:none;
border-radius:12px;
width:100%;
}

img{
width:100%;
border-radius:12px;
margin-top:10px;
}

.card{
background:#020617;
border:1px solid var(--line);
border-radius:12px;
padding:10px;
margin-top:10px;
}

.small{
font-size:12px;
color:var(--muted);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.tag{
background:#111827;
padding:6px 10px;
border-radius:999px;
font-size:12px;
}

</style>
</head>

<body>

<div class="tabbar">
<button onclick="setTab('scan')" id="t-scan" class="active">Scan</button>
<button onclick="setTab('catalog')" id="t-cat">Katalog</button>
<button onclick="setTab('outfits')" id="t-out">Outfits</button>
</div>

<!-- SCAN -->
<div id="scan" class="panel active">

<input type="file" id="fileInput" multiple />

<button class="main" onclick="analyze()">AI erkennen</button>

<img id="preview"/>

<div id="result"></div>

<button class="main" onclick="saveItem()">Speichern</button>

</div>

<!-- KATALOG -->
<div id="catalog" class="panel">

<input placeholder="Suche..." id="search" oninput="renderCatalog()"/>

<div id="catalogList"></div>

<button onclick="exportData()">Export</button>
<input type="file" id="importFile" onchange="importData()"/>

</div>

<!-- OUTFITS -->
<div id="outfits" class="panel">

<select id="style">
<option>dark</option>
<option>clean</option>
<option>sexy</option>
</select>

<button class="main" onclick="generate()">Outfits erzeugen</button>

<div id="outfitList"></div>

</div>

<script>

let current=null;

function setTab(t){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.getElementById(t).classList.add("active")

document.querySelectorAll(".tabbar button").forEach(b=>b.classList.remove("active"))
document.getElementById("t-"+t).classList.add("active")
}

const STORAGE="items_v1"

function load(){
return JSON.parse(localStorage.getItem(STORAGE)||"[]")
}

function save(data){
localStorage.setItem(STORAGE,JSON.stringify(data))
}

fileInput.onchange=()=>{
preview.src=URL.createObjectURL(fileInput.files[0])
}

async function analyze(){

const file=fileInput.files[0]
if(!file)return

const r=new FileReader()

r.onloadend=async()=>{

const res=await fetch("/.netlify/functions/analyze-garment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({imageDataUrl:r.result})
})

const data=await res.json()
current=data.analysis

result.innerHTML=`
<div class="card">
<b>${current.suggestedName}</b>
<div class="small">${current.category}</div>

<div class="grid">
<div>${current.color}</div>
<div>${current.materialHints.join(",")}</div>
<div>${current.styleTags.join(",")}</div>
<div>${current.occasionFit.join(",")}</div>
</div>
</div>
`

}

r.readAsDataURL(file)
}

function saveItem(){

if(!current)return

const items=load()

items.unshift({
...current,
img:preview.src,
id:Date.now(),
fav:false
})

save(items)
renderCatalog()

}

function renderCatalog(){

const q=search.value.toLowerCase()

const items=load().filter(i=>
!q || i.suggestedName.toLowerCase().includes(q)
)

catalogList.innerHTML=items.map(i=>`
<div class="card">

<img src="${i.img}"/>

<b>${i.suggestedName}</b>

<div class="small">${i.category}</div>

<div>
<button onclick="fav(${i.id})">★</button>
<button onclick="del(${i.id})">X</button>
</div>

</div>
`).join("")
}

function fav(id){
const items=load().map(i=>i.id==id?{...i,fav:!i.fav}:i)
save(items)
renderCatalog()
}

function del(id){
const items=load().filter(i=>i.id!=id)
save(items)
renderCatalog()
}

function generate(){

const items=load()

const top=items.find(i=>i.category=="top")
const bottom=items.find(i=>i.category=="bottom")
const shoes=items.find(i=>i.category=="shoes")

outfitList.innerHTML=`
<div class="card">
<b>Outfit</b>
<img src="${top?.img||""}">
<img src="${bottom?.img||""}">
<img src="${shoes?.img||""}">
</div>
`
}

function exportData(){
const blob=new Blob([JSON.stringify(load())])
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="data.json"
a.click()
}

function importData(){
const f=importFile.files[0]
const r=new FileReader()
r.onload=()=>{
save(JSON.parse(r.result))
renderCatalog()
}
r.readAsText(f)
}

renderCatalog()

</script>
</body>
</html>
