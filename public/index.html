<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outfit App</title>

<style>
:root{
--bg:#020617;
--panel:#0f172a;
--line:#1e293b;
--text:#f8fafc;
--muted:#94a3b8;
--accent:#22c55e;
--danger:#ef4444;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
padding:12px;
}

.tabs{
display:flex;
gap:6px;
margin-bottom:10px;
}

.tabs button{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#111827;
color:white;
}

.tabs .active{
background:var(--accent);
color:black;
font-weight:bold;
}

.panel{display:none;background:var(--panel);padding:12px;border-radius:12px;}
.panel.active{display:block;}

input,select{
width:100%;
margin:8px 0;
padding:10px;
border-radius:10px;
border:1px solid var(--line);
background:#020617;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:black;
font-weight:bold;
width:100%;
margin-top:6px;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.card{
background:#020617;
border:1px solid var(--line);
padding:10px;
border-radius:10px;
margin-top:10px;
}

.silhouette{
position:relative;
height:300px;
background:#08101f;
border-radius:12px;
margin-top:10px;
}

.layer{
position:absolute;
width:80px;
left:50%;
transform:translateX(-50%);
}

.top{top:60px;}
.bottom{top:140px;}
.shoes{top:240px;}

.small{font-size:12px;color:var(--muted);}
</style>
</head>

<body>

<div class="tabs">
<button class="active" onclick="tab('scan')" id="t-scan">Scan</button>
<button onclick="tab('cat')" id="t-cat">Katalog</button>
<button onclick="tab('out')" id="t-out">Outfits</button>
</div>

<div id="scan" class="panel active">

<input type="file" id="file">

<button onclick="analyze()">Analysieren</button>

<img id="preview">

<div id="result"></div>

<button onclick="save()">Speichern</button>

</div>

<div id="cat" class="panel">

<input id="search" placeholder="Suche..." oninput="render()">

<div id="list"></div>

<button onclick="exportData()">Export</button>
<input type="file" id="importFile" onchange="importData()">

</div>

<div id="out" class="panel">

<button onclick="outfit()">Outfit generieren</button>

<div id="outfit"></div>

</div>

<script>

let current=null;
const KEY="data_v2";

function tab(t){
["scan","cat","out"].forEach(id=>document.getElementById(id).classList.remove("active"))
document.getElementById(t).classList.add("active")

document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"))
document.getElementById("t-"+t).classList.add("active")
}

file.onchange=()=>{
preview.src=URL.createObjectURL(file.files[0])
}

async function analyze(){
const f=file.files[0];
if(!f)return;

const r=new FileReader();

r.onloadend=async()=>{
const res=await fetch("/.netlify/functions/analyze-garment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({imageDataUrl:r.result})
});

const d=await res.json();
current=d.analysis;

result.innerHTML=`
<div class="card">
<b>${current.suggestedName}</b>
<div class="small">${current.category}</div>
<div>${current.color}</div>
</div>`;
}

r.readAsDataURL(f);
}

function load(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
function saveData(d){localStorage.setItem(KEY,JSON.stringify(d))}

function save(){
if(!current)return;

const data=load();

data.unshift({...current,img:preview.src,id:Date.now()});

saveData(data);
render();
}

function render(){
const q=search.value.toLowerCase();

list.innerHTML=load().filter(i=>!q||i.suggestedName.toLowerCase().includes(q))
.map(i=>`
<div class="card">
<img src="${i.img}">
<b>${i.suggestedName}</b>
<button onclick="del(${i.id})">Löschen</button>
</div>`).join("");
}

function del(id){
saveData(load().filter(i=>i.id!=id));
render();
}

function outfit(){
const data=load();

const top=data.find(i=>i.category=="top");
const bottom=data.find(i=>i.category=="bottom");
const shoes=data.find(i=>i.category=="shoes");

outfit.innerHTML=`
<div class="card">
<b>Outfit Vorschau</b>

<div class="silhouette">
${top?`<img class="layer top" src="${top.img}">`:""}
${bottom?`<img class="layer bottom" src="${bottom.img}">`:""}
${shoes?`<img class="layer shoes" src="${shoes.img}">`:""}
</div>

</div>`;
}

function exportData(){
const blob=new Blob([JSON.stringify(load())]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="outfit.json";
a.click();
}

function importData(){
const r=new FileReader();
r.onload=()=>{saveData(JSON.parse(r.result));render();}
r.readAsText(importFile.files[0]);
}

render();

</script>

</body>
</html>
