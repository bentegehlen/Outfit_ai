<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outfitfinder Final</title>
  <style>
    :root{
      --bg:#020617;
      --panel:#0f172a;
      --card:#08101f;
      --line:#1e293b;
      --text:#f8fafc;
      --muted:#94a3b8;
      --accent:#22c55e;
      --danger:#ef4444;
      --warn:#f59e0b;
      --ok:#34d399;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:12px;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
    }
    .tabs{
      display:flex;
      gap:8px;
      margin-bottom:12px;
    }
    .tabs button{
      flex:1;
      padding:12px;
      border:none;
      border-radius:12px;
      background:#111827;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    .tabs button.active{
      background:var(--accent);
      color:#04130a;
    }
    .panel{
      display:none;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-bottom:14px;
    }
    .panel.active{display:block}
    h1,h2,h3,p{margin:0}
    .lead{
      color:var(--muted);
      margin-top:8px;
      margin-bottom:14px;
      line-height:1.4;
    }
    input[type="file"],input[type="text"],select{
      width:100%;
      background:#08101f;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      margin:8px 0 12px;
    }
    button{
      width:100%;
      border:none;
      border-radius:12px;
      padding:13px 16px;
      font-weight:800;
      cursor:pointer;
      background:var(--accent);
      color:#04130a;
    }
    button.secondary{
      background:#111827;
      color:#fff;
      border:1px solid var(--line);
    }
    button.danger{
      background:rgba(239,68,68,.14);
      color:#fecaca;
      border:1px solid rgba(239,68,68,.35);
    }
    button.small{
      width:auto;
      padding:8px 12px;
      font-size:.86rem;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .actions > *{
      flex:1;
      min-width:150px;
    }
    .status{
      margin-top:10px;
      color:var(--muted);
      font-size:.93rem;
    }
    .error-box,.ok-box{
      margin-top:10px;
      border-radius:12px;
      padding:12px;
      display:none;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .error-box{
      background:rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.35);
      color:#fecaca;
    }
    .ok-box{
      background:rgba(52,211,153,.12);
      border:1px solid rgba(52,211,153,.35);
      color:#bbf7d0;
    }
    .scan-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:12px;
    }
    .scan-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .scan-thumb{
      width:100%;
      border-radius:12px;
      background:#fff;
      border:1px solid var(--line);
      display:block;
      margin-bottom:12px;
    }
    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:10px 0;
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#111827;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:.82rem;
    }
    .badge.category{
      background:var(--accent);
      color:#04130a;
      border:none;
      font-weight:800;
    }
    .meta-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:10px 0 12px;
    }
    .meta-box{
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      min-height:66px;
    }
    .meta-box strong{
      display:block;
      margin-bottom:4px;
      font-size:.92rem;
    }
    .meta-box span{
      color:var(--muted);
      line-height:1.35;
      word-break:break-word;
    }
    .scan-state{
      font-size:.92rem;
      margin-bottom:8px;
    }
    .scan-state.pending{color:var(--muted)}
    .scan-state.loading{color:#fde68a}
    .scan-state.ok{color:#bbf7d0}
    .scan-state.err{color:#fecaca}
    .catalog-list,.outfit-list{
      display:grid;
      gap:12px;
      margin-top:12px;
    }
    .catalog-item,.outfit-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .catalog-top{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .catalog-thumb{
      width:100px;
      height:100px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      flex-shrink:0;
    }
    .catalog-content{
      flex:1;
      min-width:0;
    }
    .catalog-content h3{
      margin-bottom:8px;
      font-size:1rem;
      line-height:1.25;
    }
    .silhouette{
      position:relative;
      height:340px;
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
    }
    .figure{
      position:absolute;
      inset:0;
    }
    .figure .head,
    .figure .torso,
    .figure .hip,
    .figure .legL,
    .figure .legR,
    .figure .armL,
    .figure .armR{
      position:absolute;
      background:#1f2937;
      opacity:.95;
    }
    .figure .head{
      width:48px;height:48px;border-radius:999px;left:50%;top:18px;transform:translateX(-50%);
    }
    .figure .torso{
      width:82px;height:98px;left:50%;top:72px;transform:translateX(-50%);border-radius:24px;
    }
    .figure .hip{
      width:78px;height:36px;left:50%;top:158px;transform:translateX(-50%);border-radius:18px;
    }
    .figure .legL,.figure .legR{
      width:24px;height:118px;top:184px;border-radius:999px;
    }
    .figure .legL{left:calc(50% - 31px)}
    .figure .legR{left:calc(50% + 7px)}
    .figure .armL,.figure .armR{
      width:18px;height:94px;top:80px;border-radius:999px;
    }
    .figure .armL{left:calc(50% - 54px);transform:rotate(8deg)}
    .figure .armR{left:calc(50% + 36px);transform:rotate(-8deg)}
    .layer{
      position:absolute;
      object-fit:cover;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 6px 18px rgba(0,0,0,.28);
    }
    .layer.top{top:72px;left:50%;transform:translateX(-50%);width:96px;height:94px}
    .layer.bottom{top:160px;left:50%;transform:translateX(-50%);width:90px;height:98px}
    .layer.dress{top:72px;left:50%;transform:translateX(-50%);width:98px;height:178px}
    .layer.shoesL{top:292px;left:calc(50% - 21px);width:30px;height:26px}
    .layer.shoesR{top:292px;left:calc(50% + 7px);width:30px;height:26px}
    .empty{
      text-align:center;
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:16px;
      padding:18px;
      background:#08101f;
    }
    @media (min-width:760px){
      .scan-grid{grid-template-columns:1fr 1fr}
    }
    @media (max-width:640px){
      .meta-grid{grid-template-columns:1fr}
      .catalog-top{flex-direction:column}
      .catalog-thumb{
        width:100%;
        height:auto;
        aspect-ratio:1/1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tabs">
      <button class="active" id="tab-scan" onclick="setTab('scan')">Scan</button>
      <button id="tab-catalog" onclick="setTab('catalog')">Katalog</button>
      <button id="tab-outfits" onclick="setTab('outfits')">Outfits</button>
    </div>

    <div class="panel active" id="panel-scan">
      <h1>Outfitfinder</h1>
      <p class="lead">Mehrere Bilder auswählen, einzeln analysieren und danach einzeln oder gesammelt speichern.</p>

      <input type="file" id="fileInput" accept="image/*" multiple />

      <div class="actions">
        <button id="analyzeBtn" onclick="analyzeAll()">Alle analysieren</button>
        <button class="secondary" onclick="saveAllAnalyzed()">Alle analysierten speichern</button>
        <button class="secondary" onclick="clearBatch()">Zurücksetzen</button>
      </div>

      <div class="status" id="statusText">Bereit.</div>
      <div class="error-box" id="errorBox"></div>
      <div class="ok-box" id="okBox"></div>

      <div id="scanGrid" class="scan-grid"></div>
    </div>

    <div class="panel" id="panel-catalog">
      <input type="text" id="searchInput" placeholder="Suche..." oninput="renderCatalog()" />

      <div class="actions">
        <button class="secondary" onclick="exportData()">Export</button>
        <button class="secondary" onclick="document.getElementById('importFile').click()">Import</button>
        <button class="danger" onclick="clearCatalog()">Alles löschen</button>
      </div>

      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData()" />

      <div id="catalogList" class="catalog-list"></div>
    </div>

    <div class="panel" id="panel-outfits">
      <button onclick="generateOutfit()">Outfit generieren</button>
      <div id="outfitList" class="outfit-list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "outfitfinder_items_final_v1";
    let batchItems = [];

    function setTab(name) {
      ["scan", "catalog", "outfits"].forEach(id => {
        document.getElementById("panel-" + id).classList.remove("active");
        document.getElementById("tab-" + id).classList.remove("active");
      });
      document.getElementById("panel-" + name).classList.add("active");
      document.getElementById("tab-" + name).classList.add("active");
    }

    function uid() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function loadItems() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }

    function hideError() {
      const box = document.getElementById("errorBox");
      box.style.display = "none";
      box.textContent = "";
    }

    function showOk(msg) {
      const box = document.getElementById("okBox");
      box.style.display = "block";
      box.textContent = msg;
    }

    function hideOk() {
      const box = document.getElementById("okBox");
      box.style.display = "none";
      box.textContent = "";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden."));
        reader.readAsDataURL(file);
      });
    }

    document.getElementById("fileInput").addEventListener("change", async (e) => {
      hideError();
      hideOk();
      const files = Array.from(e.target.files || []);
      batchItems = files.map(file => ({
        id: uid(),
        file,
        previewUrl: URL.createObjectURL(file),
        state: "pending",
        error: "",
        analysis: null,
        saved: false,
        imageDataUrl: null
      }));
      renderBatch();
      document.getElementById("statusText").textContent = files.length
        ? `${files.length} Bild(er) geladen.`
        : "Bereit.";
    });

    function clearBatch() {
      batchItems = [];
      document.getElementById("fileInput").value = "";
      document.getElementById("scanGrid").innerHTML = "";
      document.getElementById("statusText").textContent = "Bereit.";
      hideError();
      hideOk();
    }

    function renderBatch() {
      const grid = document.getElementById("scanGrid");

      if (!batchItems.length) {
        grid.innerHTML = '<div class="empty">Noch keine Bilder ausgewählt.</div>';
        return;
      }

      grid.innerHTML = batchItems.map(item => `
        <div class="scan-card">
          <img class="scan-thumb" src="${item.previewUrl}" alt="Preview" />
          <div class="scan-state ${item.stateClass || stateClass(item.state)}">${stateText(item.state, item.saved)}</div>
          ${item.analysis ? renderAnalysisCard(item.analysis) : ''}
          ${item.error ? `<div class="error-box" style="display:block;">${escapeHtml(item.error)}</div>` : ''}
          <div class="actions">
            <button class="secondary" onclick="analyzeOne('${item.id}')">Einzeln analysieren</button>
            <button class="secondary" onclick="saveOne('${item.id}')">Dieses speichern</button>
          </div>
        </div>
      `).join("");
    }

    function stateClass(state) {
      if (state === "pending") return "pending";
      if (state === "loading") return "loading";
      if (state === "success") return "ok";
      return "err";
    }

    function stateText(state, saved) {
      if (saved) return "Gespeichert";
      if (state === "pending") return "Noch nicht analysiert";
      if (state === "loading") return "Analysiere...";
      if (state === "success") return "Analyse erfolgreich";
      return "Analyse fehlgeschlagen";
    }

    function renderAnalysisCard(a) {
      return `
        <div class="badge-row">
          <span class="badge category">${escapeHtml(a.category || "-")}</span>
          <span class="badge">${escapeHtml(a.suggestedName || "Unbenannt")}</span>
        </div>
        <div class="meta-grid">
          <div class="meta-box"><strong>Farbe</strong><span>${escapeHtml(a.color || "-")}</span></div>
          <div class="meta-box"><strong>Material</strong><span>${escapeHtml((a.materialHints || []).join(", ") || "-")}</span></div>
          <div class="meta-box"><strong>Style</strong><span>${escapeHtml((a.styleTags || []).join(", ") || "-")}</span></div>
          <div class="meta-box"><strong>Anlass</strong><span>${escapeHtml((a.occasionFit || []).join(", ") || "-")}</span></div>
          <div class="meta-box"><strong>Exposure</strong><span>${escapeHtml(a.exposure || "-")}</span></div>
          <div class="meta-box"><strong>Confidence</strong><span>${Math.round((a.confidence || 0) * 100)}%</span></div>
        </div>
      `;
    }

    async function analyzeOne(id) {
      const item = batchItems.find(x => x.id === id);
      if (!item) return;

      item.state = "loading";
      item.error = "";
      renderBatch();

      try {
        const imageDataUrl = await fileToDataUrl(item.file);
        item.imageDataUrl = imageDataUrl;

        const res = await fetch("/.netlify/functions/analyze-garment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imageDataUrl })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Analyse fehlgeschlagen.");
        }
        if (!data.analysis) {
          throw new Error("Keine Analyse-Daten erhalten.");
        }

        item.analysis = data.analysis;
        item.state = "success";
      } catch (err) {
        item.analysis = null;
        item.state = "error";
        item.error = err.message || "Unbekannter Fehler.";
      }

      renderBatch();
    }

    async function analyzeAll() {
      hideError();
      hideOk();

      if (!batchItems.length) {
        showError("Bitte zuerst ein oder mehrere Bilder auswählen.");
        return;
      }

      document.getElementById("analyzeBtn").disabled = true;
      document.getElementById("statusText").textContent = "Analysiere Bilder...";

      for (const item of batchItems) {
        await analyzeOne(item.id);
      }

      document.getElementById("analyzeBtn").disabled = false;
      document.getElementById("statusText").textContent = "Analyse abgeschlossen.";
    }

    function saveOne(id) {
      hideError();
      hideOk();

      const item = batchItems.find(x => x.id === id);
      if (!item || !item.analysis || !item.imageDataUrl) {
        showError("Dieses Bild wurde noch nicht erfolgreich analysiert.");
        return;
      }

      const items = loadItems();
      items.unshift({
        id: uid(),
        ...item.analysis,
        img: item.imageDataUrl
      });
      saveItems(items);
      item.saved = true;
      renderBatch();
      renderCatalog();
      showOk("Teil gespeichert.");
    }

    function saveAllAnalyzed() {
      hideError();
      hideOk();

      const valid = batchItems.filter(item => item.analysis && item.imageDataUrl && !item.saved);
      if (!valid.length) {
        showError("Es gibt keine neu analysierten Teile zum Speichern.");
        return;
      }

      const items = loadItems();
      valid.forEach(item => {
        items.unshift({
          id: uid(),
          ...item.analysis,
          img: item.imageDataUrl
        });
        item.saved = true;
      });

      saveItems(items);
      renderBatch();
      renderCatalog();
      showOk(`${valid.length} Teil(e) gespeichert.`);
    }

    function renderCatalog() {
      const q = (document.getElementById("searchInput").value || "").toLowerCase();
      const items = loadItems().filter(i =>
        !q ||
        (i.suggestedName || "").toLowerCase().includes(q) ||
        (i.color || "").toLowerCase().includes(q) ||
        (i.category || "").toLowerCase().includes(q) ||
        (i.styleTags || []).join(" ").toLowerCase().includes(q)
      );

      const list = document.getElementById("catalogList");

      if (!items.length) {
        list.innerHTML = '<div class="empty">Noch keine gespeicherten Teile.</div>';
        return;
      }

      list.innerHTML = items.map(i => `
        <div class="catalog-item">
          <div class="catalog-top">
            <img class="catalog-thumb" src="${i.img}" alt="${escapeHtml(i.suggestedName)}" />
            <div class="catalog-content">
              <h3>${escapeHtml(i.suggestedName || "Unbenannt")}</h3>
              <div class="badge-row">
                <span class="badge category">${escapeHtml(i.category || "-")}</span>
                <span class="badge">${escapeHtml(i.color || "-")}</span>
              </div>
              <div class="badge-row">
                <span class="badge">${escapeHtml((i.styleTags || []).join(", ") || "-")}</span>
                <span class="badge">${escapeHtml((i.materialHints || []).join(", ") || "-")}</span>
              </div>
              <div class="actions">
                <button class="danger small" onclick="deleteItem('${i.id}')">Löschen</button>
              </div>
            </div>
          </div>
        </div>
      `).join("");
    }

    function deleteItem(id) {
      const items = loadItems().filter(i => i.id !== id);
      saveItems(items);
      renderCatalog();
    }

    function clearCatalog() {
      if (!confirm("Wirklich alle gespeicherten Teile löschen?")) return;
      localStorage.removeItem(STORAGE_KEY);
      renderCatalog();
      document.getElementById("outfitList").innerHTML = '<div class="empty">Noch kein Outfit erzeugt.</div>';
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(loadItems(), null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "outfitfinder-katalog.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importData() {
      const f = document.getElementById("importFile").files[0];
      if (!f) return;

      const r = new FileReader();
      r.onload = () => {
        try {
          const parsed = JSON.parse(r.result);
          if (!Array.isArray(parsed)) throw new Error("Ungültige Datei.");
          saveItems(parsed);
          renderCatalog();
          showOk("Import erfolgreich.");
        } catch (err) {
          showError("Import fehlgeschlagen: " + err.message);
        }
      };
      r.readAsText(f);
    }

    function generateOutfit() {
      const data = loadItems();
      const top = data.find(i => i.category === "top");
      const bottom = data.find(i => i.category === "bottom");
      const dress = data.find(i => i.category === "dress");
      const shoes = data.find(i => i.category === "shoes");

      const useDress = !!dress && (!top || !bottom);

      document.getElementById("outfitList").innerHTML = `
        <div class="outfit-card">
          <h3>Outfit Vorschau</h3>
          <div class="silhouette">
            <div class="figure">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="hip"></div>
              <div class="legL"></div>
              <div class="legR"></div>
              <div class="armL"></div>
              <div class="armR"></div>

              ${useDress ? `<img class="layer dress" src="${dress.img}" alt="">` : ""}
              ${!useDress && top ? `<img class="layer top" src="${top.img}" alt="">` : ""}
              ${!useDress && bottom ? `<img class="layer bottom" src="${bottom.img}" alt="">` : ""}
              ${shoes ? `<img class="layer shoesL" src="${shoes.img}" alt=""><img class="layer shoesR" src="${shoes.img}" alt="">` : ""}
            </div>
          </div>
          <div class="badge-row" style="margin-top:12px;">
            ${top && !useDress ? `<span class="badge">${escapeHtml(top.suggestedName)}</span>` : ""}
            ${bottom && !useDress ? `<span class="badge">${escapeHtml(bottom.suggestedName)}</span>` : ""}
            ${dress && useDress ? `<span class="badge">${escapeHtml(dress.suggestedName)}</span>` : ""}
            ${shoes ? `<span class="badge">${escapeHtml(shoes.suggestedName)}</span>` : ""}
          </div>
        </div>
      `;
    }

    renderCatalog();
    document.getElementById("scanGrid").innerHTML = '<div class="empty">Noch keine Bilder ausgewählt.</div>';
    document.getElementById("outfitList").innerHTML = '<div class="empty">Noch kein Outfit erzeugt.</div>';
  </script>
</body>
</html>
